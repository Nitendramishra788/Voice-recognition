 <button onclick="startListening()">Start</button>

<script>
let recognition;
let voices = [];

// 🎤 Start Listening
function startListening() {
  recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

//   recognition.lang = "hi-IN";
 recognition.lang = "en-Us";
  recognition.continuous = true;   //  continuous listening
  recognition.interimResults = false;

  recognition.start();

  recognition.onresult = function(event) {
    let text = event.results[event.results.length - 1][0].transcript;
    console.log("You said:", text);

    handleCommand(text);
  };

  //  auto restart if stopped
  recognition.onend = () => {
    recognition.start();
  };
}

//  Command Handler
function handleCommand(text) {
  text = text.toLowerCase();

  if (text.includes("hello")) {
    speak("Hello bhai 😎");
  } 
  else if (text.includes("time")) {
    let time = new Date().toLocaleTimeString();
    speak("Abhi time hai " + time);
  } 
  else if (text.includes("name")) {
    speak("Mera naam assistant hai");
  } 
  else {
    speak("Samajh nahi aaya bhai 🤔");
  }
}

//  Speak function (with voice control)
function speak(msg) {
  let speech = new SpeechSynthesisUtterance(msg);

  // 🎛 control
  speech.rate = 0.9;
  speech.pitch = 1;
  speech.volume = 1;

  //  voice select (Hindi female try)
  let selectedVoice = voices.find(v => 
    v.lang === "hi-IN" && v.name.toLowerCase().includes("female")
  );

  if (!selectedVoice) {
    selectedVoice = voices.find(v => v.lang === "hi-IN");
  }

  if (selectedVoice) {
    speech.voice = selectedVoice;
  }

  speechSynthesis.speak(speech);
}

//  Load voices properly
speechSynthesis.onvoiceschanged = () => {
  voices = speechSynthesis.getVoices();
};
</script>
